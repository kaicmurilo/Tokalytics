name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.asset }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-15-intel
            goos: darwin
            goarch: amd64
            asset: tokalytics-darwin-amd64
          - runner: macos-latest
            goos: darwin
            goarch: arm64
            asset: tokalytics-darwin-arm64
          - runner: ubuntu-latest
            goos: linux
            goarch: amd64
            asset: tokalytics-linux-amd64
          - runner: ubuntu-24.04-arm
            goos: linux
            goarch: arm64
            asset: tokalytics-linux-arm64
          - runner: windows-latest
            goos: windows
            goarch: amd64
            asset: tokalytics-windows-amd64.exe

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Linux dependencies (GTK / systray)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc libgtk-3-dev libayatana-appindicator3-dev

      - name: Install MinGW (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install mingw -y --no-progress
          $bin = $null
          $gcc = Get-Command gcc -ErrorAction SilentlyContinue
          if ($gcc) { $bin = Split-Path $gcc.Source }
          if (-not $bin) {
            $found = Get-ChildItem "C:\ProgramData\chocolatey\lib\mingw" -Recurse -Filter "gcc.exe" -ErrorAction SilentlyContinue | Select-Object -First 1
            if ($found) { $bin = Split-Path $found.FullName }
          }
          if (-not $bin) { throw "gcc não encontrado após choco install mingw" }
          $bin | Out-File -FilePath $env:GITHUB_PATH -Append

      - name: Build (Unix)
        if: runner.os != 'Windows'
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 1
        run: go build -trimpath -ldflags="-s -w -X main.Version=${{ github.ref_name }}" -o ${{ matrix.asset }} .

      - name: Build (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          GOOS: windows
          GOARCH: amd64
          CGO_ENABLED: 1
        run: go build -trimpath -ldflags="-s -w -X main.Version=${{ github.ref_name }}" -o ${{ matrix.asset }} .

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.asset }}

  publish-npm:
    name: Publish to npm
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
          always-auth: true

      - name: Set version from tag
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          # Sem --allow-same-version, npm falha com "Version not changed" se package.json já = tag.
          npm version "$VERSION" --no-git-tag-version --allow-same-version

      # Exige token granular npm com "Bypass two-factor authentication" ligado;
      # senão o publish falha com EOTP (não dá para passar --otp no CI).
      - name: Publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public
